name: Android Release Build

on:
  push:
    tags:
      - '*'  # 仅当推送标签时构建（例如 v1.0.0）
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.jvmargs=-Xmx4096m -XX:+HeapDumpOnOutOfMemoryError"
      SWIG_VERSION: "4.1.1"
      ANDROID_NDK_VERSION: "25.1.8937393"
      ANDROID_CMAKE_VERSION: "3.22.1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true  # 确保获取Git标签，解决"Tag doesn't match the version name pattern: null"错误

      - name: Setup Java
        id: setup-java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Set up Android SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          echo "PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools" >> $GITHUB_ENV

      - name: Install Android NDK
        run: |
          echo "Installing NDK ${{ env.ANDROID_NDK_VERSION }}"
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;${{ env.ANDROID_NDK_VERSION }}"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${{ env.ANDROID_NDK_VERSION }}" >> $GITHUB_ENV

      - name: Install CMake
        run: |
          echo "Installing CMake ${{ env.ANDROID_CMAKE_VERSION }}"
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "cmake;${{ env.ANDROID_CMAKE_VERSION }}"

      - name: Install SWIG
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcre3-dev
          wget https://downloads.sourceforge.net/project/swig/swig/swig-${{ env.SWIG_VERSION }}/swig-${{ env.SWIG_VERSION }}.tar.gz
          tar -xzf swig-${{ env.SWIG_VERSION }}.tar.gz
          cd swig-${{ env.SWIG_VERSION }}
          ./configure
          make
          sudo make install
          cd ..
          rm -rf swig-${{ env.SWIG_VERSION }}*

      - name: Accept Android licenses
        run: |
          mkdir -p $HOME/.android
          echo "count=0" > $HOME/.android/repositories.cfg
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Set up keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "Error: KEYSTORE_BASE64 secret is not set"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > app/release-keystore.jks
          echo "Keystore file created at $(pwd)/app/release-keystore.jks"
          ls -la app/release-keystore.jks

      - name: Configure signing config for release build
        run: |
          python3 - <<'EOF'
          import re

          with open("app/build.gradle", "r") as f:
              content = f.read()

          release_config = '''        release {
                      storeFile file("release-keystore.jks")
                      storePassword System.getenv("KEYSTORE_PASSWORD")
                      keyAlias System.getenv("KEY_ALIAS")
                      keyPassword System.getenv("KEY_PASSWORD")
                  }
          '''

          # 在 signingConfigs { 行的下一行插入 release 配置（插在 if 块之前，顶层始终可见）
          insert_marker = "signingConfigs {"
          pos = content.find(insert_marker)
          if pos == -1:
              raise RuntimeError("signingConfigs { not found in app/build.gradle")
          insert_pos = content.find("\n", pos) + 1
          content = content[:insert_pos] + release_config + content[insert_pos:]

          # 只替换 release buildType 里的 signingConfig，不动 debug buildType
          content = re.sub(
              r'(release\s*\{[^}]*?)signingConfig\s+signingConfigs\.debug',
              r'\1signingConfig signingConfigs.release',
              content,
              count=1,
              flags=re.DOTALL
          )

          with open("app/build.gradle", "w") as f:
              f.write(content)

          print("app/build.gradle modified successfully")
          EOF

          echo "=== Modified signingConfigs section ==="
          grep -A 30 "signingConfigs {" app/build.gradle | head -35
          echo ""
          echo "=== Modified buildTypes section ==="
          grep -A 8 "buildTypes {" app/build.gradle | head -20

      - name: Build release APK
        run: |
          ./gradlew assembleProductionVanillaOpenSourceRelease \
            --stacktrace \
            -Dorg.gradle.daemon=false \
            -Dorg.gradle.parallel=true \
            -Dorg.gradle.jvmargs=-Xmx4096m
        env:
          JAVA_HOME: ${{ steps.setup-java.outputs.path }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}

      - name: Verify APK exists
        run: |
          APK_PATH=$(find app/build/outputs/apk/productionVanillaOpenSource/release/ -name "*.apk" | head -1)
          if [ ! -f "$APK_PATH" ]; then
            echo "Error: Release APK file not found after build"
            exit 1
          fi
          echo "APK found at $APK_PATH"
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: ProductionVanillaOpenSource-Release-APK
          path: ${{ env.APK_PATH }}
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: ./metadata/version_fdroid.txt
          files: ${{ env.APK_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
